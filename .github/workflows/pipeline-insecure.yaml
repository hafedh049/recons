name: CyberWatch CI/CD Pipeline

on:
  push:
    branches:
      - dev

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/cyberwatch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build et push
        run: |
          docker build -t $IMAGE_NAME:${{ github.run_number }} .
          docker push $IMAGE_NAME:${{ github.run_number }}
          docker tag $IMAGE_NAME:${{ github.run_number }} $IMAGE_NAME:latest
          docker push $IMAGE_NAME:latest
     
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Ensure namespace exists
            kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -
      
            # Apply deployment YAML (creates deployment if missing, updates if exists)
            kubectl apply -f ~/cyberwatch/k8s/deployment.yaml -n production
      
            # Update image to latest CI build
            kubectl set image deployment/cyberwatch \
              cyberwatch=${{ secrets.DOCKERHUB_USERNAME }}/cyberwatch:${{ github.run_number }} \
              -n production
